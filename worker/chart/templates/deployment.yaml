apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: worker
  name: worker
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - image: {{ .Values.image }}
        name: worker
        env:
        - name: DB_RETRY_INITIAL
          value: {{ .Values.resilience.dbRetry.initial | quote }}
        - name: DB_RETRY_MAX
          value: {{ .Values.resilience.dbRetry.max | quote }}
        - name: DB_RETRY_JITTER
          value: {{ .Values.resilience.dbRetry.jitter | quote }}
